name: CaseOh Live Check

on:
  schedule:
    # Two crons so the job starts at 22:05 America/New_York year-round.
    # GitHub Actions cron is UTC-only and does not follow DST, so we list both:
    #   02:05 UTC = 22:05 EDT (summer)
    #   03:05 UTC = 22:05 EST (winter)
    # The Python script checks the NY clock and exits immediately on the
    # wrong-DST cron, so only one of these actually polls each night.
    - cron: "5 2 * * *"
    - cron: "5 3 * * *"

  # Lets you trigger a one-shot test from the Actions tab without waiting for 10pm.
  workflow_dispatch:
    inputs:
      test_now:
        description: "Run a one-shot test regardless of the time of day"
        type: boolean
        default: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Window is 22:05-23:05 NY (1 hour) plus setup/teardown.
    # 70 minutes gives margin without risking a GitHub-side kill.
    timeout-minutes: 70
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run liveness check
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TEST_NOW: ${{ inputs.test_now }}
        run: python caseoh/caseoh_cloud_check.py
